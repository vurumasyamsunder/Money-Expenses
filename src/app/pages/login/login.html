<div class="container">
  <div class="row">
    <div class="col-md-6 offset-md-3">

      <h2 class="text-center text-dark mt-5">Login Form</h2>

      <div class="card my-5">

        <form [formGroup]="loginForm" class="card-body cardbody-color p-lg-5">

          <div class="text-center">

            <h4>LOGIN</h4>

            <div class="row">
              <input
              type="text"
              class="form-control"
              formControlName="username"
              placeholder="User Name">
            </div>

            <div class="row mt-3">
              <input
              type="password"
              class="form-control"
              formControlName="password"
              placeholder="Pass Word">
            </div>

            <div class="row mt-5">
              <div class="text-center">
                <button
                type="button"
                class="btn btn-primary"
                (click)="Login()">
                  Login
                </button>
              </div>
            </div>

          </div>

        </form>

      </div>

    </div>
  </div>
</div>
